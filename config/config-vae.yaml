# Base VAE experiment configuration.


# Optional checkpoint path used to resume a previous run.
resume: null

# Dataset paths and dataloader/augmentation settings.
data:
  train_dir: "dataset/vae_dataset_pc/png_scaled/train"
  valid_dir: "dataset/vae_dataset_pc/png_scaled/validation"
  archetypes_dir: "dataset/archetypes_pc/png_scaled"  # Reference exemplars used in latent analyses.
  batch_size: 4  # Physical batch size per optimizer step.
  num_workers: 8  # DataLoader workers for parallel image loading.
  seed: 42  # Global seed for reproducibility.

  max_height: 1500  # Crop very tall pages to keep memory usage bounded.

  noise_level: 0.15  # Gaussian noise amplitude for denoising training.

  augment: true  # Enable train-time data augmentation.
  sp_prob: 0.03  # Salt-and-pepper corruption probability.
  random_erasing_prob: 0.30  # Random block removal probability.
  hflip_p: 0.5  # Horizontal flip probability.
  vflip_p: 0.5  # Vertical flip probability.
  translate: [0.1, 0.1]  # Max translation ratio on X and Y axes.

  random_crop_p: 0.3  # Probability of applying random resized crop.
  random_crop_scale: [0.5, 1.0]  # Relative crop area range.
  random_crop_ratio: [0.75, 1.33]  # Aspect ratio range for random crops.

# Model architecture and latent-space dimensions.
model:
  class: "FullyConvVAE"  # Model class name resolved in the model factory.
  latent_dim: 6  # Number of latent channels in the spatial bottleneck.
  input_channels: 1  # Grayscale input.
  dropout_p: 0.15  # Dropout in decoder blocks.

# Reconstruction and KL divergence balancing parameters.
loss:
  name: "l1"  # Reconstruction loss type: l1 or mse.
  beta_kld: 0.0001  # Weight of KL regularization term.
  warmup_epochs: 20  # Linear KL warmup duration.

# Optimizer and learning-rate scheduler parameters.
optim:
  algo: "AdamW"
  params:
    lr: 0.0002
    weight_decay: 0.0003

optim:
  algo: AdamW
  params:
    lr: 0.0002  # Peak learning rate.
    weight_decay: 0.0003  # L2 regularization via AdamW decoupled decay.
  scheduler:
    name: OneCycleLR  # Batch-wise LR schedule with warmup and annealing.
    params:
      anneal_strategy: cos
      div_factor: 25.0  # initial_lr = max_lr / div_factor.
      final_div_factor: 1000.0  # min_lr = initial_lr / final_div_factor.
      max_lr: 0.0002
      pct_start: 0.25  # Fraction of steps used for LR warmup.

optimization:
  accumulation_steps: 8  # Effective batch size multiplier.
  mixed_precision: true  # Enable AMP on CUDA.

# Logging frequency and artifact collection options.
logging:
  logdir: "./logs"  # Root folder where run directories are created.
  tensorboard: true
  log_loss_components: true  # Log reconstruction and KL parts separately.
  save_reconstructions_every: 5  # Epoch interval for reconstruction previews.

# Total number of training epochs.
nepochs: 50

# Inference-time configuration.
test:
  test_input_dir: "dataset/vae_dataset_pc/png_scaled/validation"  # Folder of input PNGs.
  test_output_dir: "test/test_output"  # Side-by-side output folder.
  model_path: "logs/VAE_6/last_model.pt"  # Checkpoint used for inference.

# Latent interpolation command configuration.
interpolate:
  image1_path: "dataset/vae_dataset_pc/png_scaled/validation/wireframe_2925866.png"  # Interpolation start image.
  image2_path: "dataset/vae_dataset_pc/png_scaled/validation/wireframe_3015001.png"  # Interpolation end image.
  output_dir: "test/interpolate_output"  # Output folder for interpolation strip.
  num_steps: 10  # Number of latent interpolation points.
  model_path: "logs/VAE_6/last_model.pt"  # Checkpoint used for encode/decode.

# Latent-space clustering command configuration.
clustering:
  model_path: "logs/VAE_13/last_model.pt"  # Encoder checkpoint used to produce latents.
  data_dir: "dataset/vae_dataset_pc/png_scaled/validation"  # Images to cluster.
  output_dir: null  # Null means output next to model checkpoint.
  max_samples: 4000  # Max points displayed in interactive visualization.
  n_clusters: 9  # K for K-Means and GMM.
  viz_method: "both"  # pca, tsne, or both.
  archetypes_dir: "dataset/archetypes_pc/png_scaled"  # Optional reference samples.
