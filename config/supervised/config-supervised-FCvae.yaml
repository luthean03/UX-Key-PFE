# Fully Convolutional VAE Configuration

# Resume training from checkpoint (optional)
resume: "logs/FullyConvVAE_7/last_model.pt"  # Path to checkpoint (null to start fresh)

data:
  train_dir: "dataset_supervised/dataset_supervised_pc/png_scaled/train"
  valid_dir: "dataset_supervised/dataset_supervised_pc/png_scaled/validation"
  archetypes_dir: "dataset_supervised/archetypes_pc/png_scaled"  # Labeled wireframes for latent metrics
  batch_size: 4                    # SmartBatchSampler groups similar-sized images to minimize padding
  num_workers: 8                   # I/O parallelization (reduced for RAM)
  seed: 42                         # Reproducibility
  
  # Memory management
  max_height: 2048                 # Maximum height
  
  # Denoising augmentation
  noise_level: 0.15                # Gaussian noise (0.20 can blur thin wireframe lines)
  
  # Data augmentation (applied to training only)
  augment: true
  sp_prob: 0.03                    # Salt-and-pepper noise probability
  random_erasing_prob: 0.35        # Random masking — forces global context understanding
  hflip_p: 0.5                     # Horizontal flip — layout remains valid
  vflip_p: 0.5                     # Vertical flip — layout remains valid
  translate: [0.1, 0.1]            # Random translation (X, Y fraction) — degrees forced to 0
  
  # Random resized crop
  random_crop_p: 0.3               # Probability of applying random resized crop
  random_crop_scale: [0.5, 1.0]    # Crop area ratio range
  random_crop_ratio: [0.75, 1.33]  # Aspect ratio range

# Model architecture
model:
  class: "FullyConvVAE"            # NOUVEAU : Doit correspondre au nom de ta nouvelle classe
  latent_dim: 16                   # NOUVEAU : Représente maintenant le nombre de CANAUX de la grille spatiale (16 est idéal)
  input_channels: 1                # Grayscale images
  dropout_p: 0.15                  # Higher dropout — small dataset needs more regularisation

# Loss configuration
# SimpleVAELoss (Fully Convolutional): L1 reconstruction + Spatial KL divergence
#
# Reconstruction is normalised per-pixel:
#   recon = sum(|x - x̂| * mask) / num_valid_pixels
# KLD is normalised per-spatial-volume to remain scale-invariant:
#   kld   = mean_batch(sum_channels(KLD) / (H_latent * W_latent))
#
# Because KLD is now averaged spatially, beta_kld should typically be 
# around 0.01 to 0.1. Warmup is crucial to let the local convolutions 
# find the geometric structures before applying the compression tax.
loss:
  name: "l1"                     # 'l1' or 'mse'
  beta_kld: 0.0001                 # NOUVEAU : Rééquilibré pour la normalisation spatiale 3D
  warmup_epochs: 0              # NOUVEAU : 10% du training pour construire les arêtes nettes d'abord

# Optimizer configuration
optim:
  algo: "AdamW"
  params:
    lr: 0.0001                   # Slightly lower peak LR for small dataset stability
    weight_decay: 0.0003         # Stronger decay to prevent overfitting on 17K images
  
  # Learning rate scheduler
  scheduler:
    name: "OneCycleLR"           # Warmup + Cosine Decay (steps per batch)
    params:
      max_lr: 0.0001             # Peak LR (match optim.params.lr)
      pct_start: 0.25            # 25% warmup (shorter — smaller dataset converges faster)
      div_factor: 10.0           # initial_lr = max_lr / 25 = 8e-6
      final_div_factor: 1000.0   # min_lr = initial_lr / 1000 ≈ 8e-9
      anneal_strategy: "cos"     # Cosine annealing after warmup

# Training optimization
optimization:
  accumulation_steps: 8          # Effective batch = 4 × 8 = 32 (critical for small dataset)
  mixed_precision: true          # Automatic mixed precision for speed and memory

# Logging configuration
logging:
  logdir: "./logs"
  tensorboard: true
  log_loss_components: true      # Log SSIM/gradient/KLD separately
  save_reconstructions_every: 5

# Training configuration
nepochs: 100                      # More epochs for small dataset (OneCycleLR adapts automatically)

# Test (inference) configuration
test:
  test_input_dir: "dataset_supervised/dataset_supervised_pc/png_scaled/validation"
  test_output_dir: "dataset_supervised/dataset_supervised_pc/png_scaled/test"
  model_path: "logs/FullyConvVAE_1/last_model.pt"  # À mettre à jour après le run

# Interpolation configuration
interpolate:
  image1_path: "dataset_supervised/dataset_supervised_pc/png_scaled/validation/wireframe_2925866.png"
  image2_path: "dataset_supervised/dataset_supervised_pc/png_scaled/validation/wireframe_3015001.png"
  output_dir: "dataset_supervised/dataset_supervised_pc/png_scaled/interpolate_output"
  num_steps: 10
  model_path: "logs/FullyConvVAE_1/last_model.pt"

# Clustering configuration
clustering:
  model_path: "logs/FullyConvVAE_7/last_model.pt"
  data_dir: "dataset_supervised/dataset_supervised_pc/png_scaled/validation"
  output_dir: null
  max_samples: 4000
  n_clusters: 9
  viz_method: "both"
  archetypes_dir: "dataset_supervised/archetypes_pc/png_scaled"
  gt_json_dir: dataset_supervised/dataset_supervised_pc/json