# Supervised fully-convolutional VAE experiment configuration.


# Optional checkpoint path used to resume a previous run.
resume: null

# Dataset paths and dataloader/augmentation settings.
data:
  train_dir: "dataset_supervised/dataset_supervised_pc/png_scaled/train"
  valid_dir: "dataset_supervised/dataset_supervised_pc/png_scaled/validation"
  archetypes_dir: "dataset_supervised/archetypes_pc/png_scaled"  # Reference exemplars for latent analysis.
  batch_size: 4  # Physical batch size.
  num_workers: 8  # Data loading workers.
  seed: 42  # Reproducibility seed.

  max_height: 2048  # Clip very tall pages.

  noise_level: 0.15  # Gaussian noise level for denoising training.

  augment: true
  sp_prob: 0.03
  random_erasing_prob: 0.35
  hflip_p: 0.5
  vflip_p: 0.5
  translate: [0.1, 0.1]

  random_crop_p: 0.3
  random_crop_scale: [0.5, 1.0]
  random_crop_ratio: [0.75, 1.33]

# Model architecture and latent-space dimensions.
model:
  class: "FullyConvVAE"  # Spatial-latent architecture.
  latent_dim: 14  # Number of latent channels.
  input_channels: 1
  dropout_p: 0.15

# Reconstruction and KL divergence balancing parameters.
loss:
  name: "l1"  # Reconstruction loss function.
  beta_kld: 0.001  # KL regularization weight.
  warmup_epochs: 0  # No KL warmup for this setup.

# Optimizer and learning-rate scheduler parameters.
optim:
  algo: AdamW
  params:
    lr: 0.0002
    weight_decay: 0.0003
  scheduler:
    name: OneCycleLR
    params:
      anneal_strategy: cos
      div_factor: 25.0
      final_div_factor: 1000.0
      max_lr: 0.0002
      pct_start: 0.25

optimization:
  accumulation_steps: 8  # Effective batch size multiplier.
  mixed_precision: true  # Enable AMP on CUDA.

# Logging frequency and artifact collection options.
logging:
  logdir: "./logs"
  tensorboard: true
  log_loss_components: true
  save_reconstructions_every: 5

# Total number of training epochs.
nepochs: 100

# Inference-time configuration.
test:
  test_input_dir: "dataset_supervised/dataset_supervised_pc/png_scaled/validation"
  test_output_dir: "dataset_supervised/dataset_supervised_pc/png_scaled/test"
  model_path: "logs/FullyConvVAE_1/last_model.pt"  # Checkpoint path.

# Latent interpolation command configuration.
interpolate:
  image1_path: "dataset_supervised/dataset_supervised_pc/png_scaled/validation/wireframe_2925866.png"
  image2_path: "dataset_supervised/dataset_supervised_pc/png_scaled/validation/wireframe_3015001.png"
  output_dir: "dataset_supervised/dataset_supervised_pc/png_scaled/interpolate_output"
  num_steps: 10
  model_path: "logs/FullyConvVAE_1/last_model.pt"

# Latent-space clustering command configuration.
clustering:
  model_path: "logs/FullyConvVAE_8/last_model.pt"
  data_dir: "dataset_supervised/dataset_supervised_pc/png_scaled/validation"
  output_dir: null  # Null means save near the checkpoint.
  max_samples: 4000
  n_clusters: 9
  viz_method: "both"
  archetypes_dir: "dataset_supervised/archetypes_pc/png_scaled"
  gt_json_dir: dataset_supervised/dataset_supervised_pc/json  # Optional labels for external metrics.
